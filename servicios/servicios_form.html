<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Servicio - BarberShop Management</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <script src="../navbar.js"></script>
    
    <div class="main-container">
        <div class="page-title">
            <i class="bi bi-clipboard2-check"></i>
            <h2 id="form-titulo">Nuevo Servicio</h2>
        </div>
        
        <div class="row">
            <div class="col-md-8 col-lg-6">
                <div class="card">
                    <div class="card-body">
                        <form id="servicioForm">
                            <div class="mb-3" style="display: none;">
                                <label for="servicioId" class="form-label">ID</label>
                                <input type="text" class="form-control" id="servicioId" readonly>
                            </div>
                            
                            <div class="mb-3">
                                <label for="nombre" class="form-label">Nombre <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="nombre" required placeholder="Ej: Corte de cabello">
                            </div>
                            
                            <div class="mb-3">
                                <label for="descripcion" class="form-label">Descripción <span class="text-danger">*</span></label>
                                <textarea class="form-control" id="descripcion" rows="3" required placeholder="Describe el servicio..."></textarea>
                            </div>
                            
                            <div class="mb-3">
                                <label for="precio" class="form-label">Precio (S/) <span class="text-danger">*</span></label>
                                <input type="number" class="form-control" id="precio" required step="0.01" placeholder="Ej: 50.00">
                            </div>
                            
                            <div class="mb-3">
                                <label for="duracionMinutos" class="form-label">Duración (minutos) <span class="text-danger">*</span></label>
                                <input type="number" class="form-control" id="duracionMinutos" required placeholder="Ej: 30">
                            </div>
                            
                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-gold">
                                    <i class="bi bi-check-circle"></i> Guardar
                                </button>
                                <a href="servicios.html" class="btn btn-secondary">
                                    <i class="bi bi-x-circle"></i> Cancelar
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- Servicios Form JS -->
    <script src="servicios_form.js"></script>
</body>
</html>
