<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caja POS - BarberShop Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">

    <style>
        .pos-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .pos-card { background: #fff; border-radius: .5rem; padding: 1rem; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
        .servicio-row { display: flex; align-items: center; padding: .5rem; border-bottom: 1px solid #eee; }
        .servicio-row:hover { background: #f8f9fa; cursor: pointer; }
        .totales-row { display: flex; justify-content: space-between; padding: .35rem 0; }
        .totales-row.total { font-size: 1.4rem; font-weight: 600; border-top: 2px solid #333; margin-top: .5rem; padding-top: .5rem; }
        @media (max-width: 900px) { .pos-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <script src="../navbar.js"></script>

    <div class="main-container">
        <div class="page-title">
            <i class="bi bi-cash-coin"></i>
            <h2>Caja — Punto de Venta</h2>
        </div>

        <div class="pos-grid">
            <!-- IZQUIERDA: cita + cliente + servicios disponibles -->
            <div>
                <div class="pos-card mb-3">
                    <h5><i class="bi bi-calendar-check"></i> Cita asociada (opcional)</h5>
                    <select class="form-select" id="citaSelect">
                        <option value="">— Sin cita asociada —</option>
                    </select>
                </div>

                <div class="pos-card mb-3">
                    <h5><i class="bi bi-person-vcard"></i> Datos del cliente</h5>
                    <div class="mb-2">
                        <label class="form-label mb-1">Tipo de comprobante</label>
                        <div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="tipoDoc" id="tipoBoleta" value="BOLETA" checked>
                                <label class="form-check-label" for="tipoBoleta">Boleta (DNI)</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="tipoDoc" id="tipoFactura" value="FACTURA">
                                <label class="form-check-label" for="tipoFactura">Factura (RUC)</label>
                            </div>
                        </div>
                    </div>
                    <div class="mb-2">
                        <label class="form-label mb-1" id="lblNumero">DNI</label>
                        <input type="text" class="form-control" id="numeroDocumento" maxlength="11" placeholder="8 dígitos">
                    </div>
                    <div>
                        <label class="form-label mb-1" id="lblNombre">Nombre del cliente</label>
                        <input type="text" class="form-control" id="nombreCliente" placeholder="Nombres y apellidos">
                    </div>
                </div>

                <div class="pos-card">
                    <h5><i class="bi bi-clipboard2-check"></i> Servicios disponibles</h5>
                    <input type="text" class="form-control mb-2" id="buscarServicio" placeholder="Buscar servicio...">
                    <div id="serviciosList" style="max-height: 300px; overflow-y: auto;"></div>
                </div>
            </div>

            <!-- DERECHA: carrito + totales + acciones -->
            <div>
                <div class="pos-card mb-3">
                    <h5><i class="bi bi-cart3"></i> Carrito</h5>
                    <table class="table table-sm" id="carritoTable">
                        <thead>
                            <tr>
                                <th>Servicio</th>
                                <th class="text-center" style="width: 90px;">Cant.</th>
                                <th class="text-end">Precio</th>
                                <th class="text-end">Subtotal</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                    <p class="text-muted text-center mb-0" id="carritoVacio">El carrito está vacío.</p>
                </div>

                <div class="pos-card mb-3">
                    <div class="totales-row">
                        <span>Subtotal (sin IGV):</span>
                        <span id="lblSubtotal">S/. 0.00</span>
                    </div>
                    <div class="totales-row">
                        <span>IGV (18%):</span>
                        <span id="lblIgv">S/. 0.00</span>
                    </div>
                    <div class="totales-row total">
                        <span>TOTAL:</span>
                        <span id="lblTotal">S/. 0.00</span>
                    </div>
                </div>

                <div class="d-grid gap-2">
                    <button class="btn btn-primary btn-lg" id="btnEmitirBoleta">
                        <i class="bi bi-receipt"></i> Emitir Boleta
                    </button>
                    <button class="btn btn-success btn-lg" id="btnEmitirFactura">
                        <i class="bi bi-file-earmark-text"></i> Emitir Factura
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../config.js"></script>
    <script src="pos.js"></script>
</body>
</html>
