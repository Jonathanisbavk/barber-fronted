<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Barbero - BarberShop Management</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <script src="../navbar.js"></script>
    
    <div class="main-container">
        <div class="page-title">
            <i class="bi bi-scissors"></i>
            <h2 id="form-titulo">Nuevo Barbero</h2>
        </div>
        
        <div class="row">
            <div class="col-md-8 col-lg-6">
                <div class="card">
                    <div class="card-body">
                        <form id="barberoForm">
                            <div class="mb-3" style="display: none;">
                                <label for="barberoId" class="form-label">ID</label>
                                <input type="text" class="form-control" id="barberoId" readonly>
                            </div>
                            
                            <div class="mb-3">
                                <label for="nombre" class="form-label">Nombre <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="nombre" required placeholder="Ej: Juan Pérez">
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Especialidades <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <input type="text" class="form-control" id="especialidad-input"
                                           placeholder="Ej: Corte clásico — presiona Enter o +"
                                           autocomplete="off">
                                    <button type="button" class="btn btn-gold" id="btn-agregar-esp">
                                        <i class="bi bi-plus-lg"></i>
                                    </button>
                                </div>
                                <!-- Contenedor de tags (badges removibles) -->
                                <div id="especialidades-tags" class="mt-2 d-flex flex-wrap gap-2 min-height-tags"></div>
                                <div id="especialidades-feedback" class="invalid-feedback" style="display:none;">
                                    Agrega al menos una especialidad.
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label for="telefono" class="form-label">Teléfono <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <span class="input-group-text" style="background:#444; color:var(--color-gold); border-color:var(--color-border); font-weight:600;">+51</span>
                                    <input type="tel" class="form-control" id="telefono"
                                           placeholder="987654321"
                                           maxlength="9"
                                           pattern="[0-9]{9}"
                                           inputmode="numeric">
                                </div>
                                <div id="telefono-feedback" class="invalid-feedback" style="display:none;">
                                    Ingresa exactamente 9 dígitos numéricos.
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label for="disponible" class="form-label">Estado <span class="text-danger">*</span></label>
                                <select class="form-select" id="disponible" required>
                                    <option value="">-- Seleccione un estado --</option>
                                    <option value="true">Disponible</option>
                                    <option value="false">No disponible</option>
                                </select>
                            </div>
                            
                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-gold">
                                    <i class="bi bi-check-circle"></i> Guardar
                                </button>
                                <a href="barberos.html" class="btn btn-secondary">
                                    <i class="bi bi-x-circle"></i> Cancelar
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- Config -->
    <script src="../config.js"></script>

    <!-- Barberos Form JS -->
    <script src="barberos_form.js"></script>
</body>
</html>
